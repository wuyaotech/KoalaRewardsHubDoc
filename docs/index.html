<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>KoalaRewardsHub 需求文档</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.min.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #42b983;
      --sidebar-width: 260px;
      --sidebar-nav-link-color--active: #42b983;
      --sidebar-nav-link-font-weight--active: 600;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '🐨 KoalaRewardsHub',
      nameLink: '/',
      repo: false,
      loadSidebar: true,
      subMaxLevel: 2,
      search: {
        placeholder: '搜索文档',
        noData: '没有找到结果',
        depth: 3
      },
      auto2top: true,
      coverpage: false,
      notFoundPage: true,
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
